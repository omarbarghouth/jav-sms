{% extends "base.html" %}
{% block title %}Add Key Personnel{% endblock %}
{% block content %}
<div class="page-title">Add Key Safety Personnel</div>
<form class="form-card" method="POST">
  <div class="sec">Personnel Details</div>
  <div class="g2">
    <div class="fg"><label>Full Name *</label><input type="text" name="name" required/></div>
    <div class="fg"><label>Position / Job Title *</label><input type="text" name="position" required/></div>
    <div class="fg"><label>Department</label>
      <select name="department_id">
        <option value="">Select…</option>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>SMS Role *</label>
      <select name="sms_role" required>
        <option>Accountable Manager</option>
        <option>Safety Manager</option>
        <option>SMS Coordinator</option>
        <option>Safety Officer</option>
        <option>Department Safety Representative</option>
        <option>Other</option>
      </select></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Contact Email</label><input type="email" name="contact_email"/></div>
    <div class="fg"><label>Contact Phone</label><input type="text" name="contact_phone"/></div>
  </div>
  <div class="fg"><label>Qualifications / Licences</label>
    <textarea name="qualifications" rows="3" placeholder="ATPL, Type ratings, SMS training certificates…"></textarea></div>
  <div class="g2">
    <div class="fg" style="flex-direction:row;align-items:center;gap:8px;margin-top:6px">
      <input type="checkbox" name="sms_trained" value="yes" id="tr" style="width:auto"/>
      <label for="tr" style="font-size:13px;text-transform:none;letter-spacing:0;font-weight:500">SMS Training Completed</label>
    </div>
    <div class="fg"><label>Training Date</label><input type="date" name="training_date"/></div>
  </div>
  <button type="submit" class="btn btn-nav">Add Personnel Record</button>
</form>
{% endblock %}

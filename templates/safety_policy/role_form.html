{% extends "base.html" %}
{% block title %}Add Safety Role{% endblock %}
{% block content %}
<div class="page-title">Add Safety Role / Accountability</div>
<div class="page-sub">Define who is responsible for safety within the organisation</div>
<form class="form-card" method="POST">
  <div class="sec">Role Information</div>
  <div class="g2">
    <div class="fg"><label>Role Type *</label>
      <select name="role_type" required>
        <option>Accountable Manager</option>
        <option>Safety Manager</option>
        <option>Department Manager</option>
        <option>Safety Officer</option>
        <option>SMS Coordinator</option>
        <option>Other</option>
      </select></div>
    <div class="fg"><label>Role Name *</label>
      <input type="text" name="role_name" required placeholder="e.g. Director of Flight Operations"/></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Person Name *</label><input type="text" name="person_name" required/></div>
    <div class="fg"><label>Department</label>
      <select name="department_id">
        <option value="">All / Corporate</option>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Contact Email</label><input type="email" name="contact_email"/></div>
    <div class="fg"><label>Contact Phone</label><input type="text" name="contact_phone"/></div>
  </div>
  <div class="fg"><label>Effective From</label><input type="date" name="effective_from" value="{{ now.strftime('%Y-%m-%d') }}"/></div>
  <div class="fg"><label>Responsibilities *</label>
    <textarea name="responsibilities" required rows="5" placeholder="Describe the safety responsibilities and accountabilities of this role…"></textarea></div>
  <div class="fg"><label>Authority</label>
    <textarea name="authority" rows="3" placeholder="What authority does this role have to stop unsafe operations, allocate resources, etc.?"></textarea></div>
  <button type="submit" class="btn btn-nav">Add Role</button>
</form>
{% endblock %}

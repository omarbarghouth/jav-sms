{% extends "base.html" %}
{% block title %}New MOC{% endblock %}
{% block content %}
<div class="page-title">New Management of Change</div>
<div class="page-sub">Pre-change safety assessment · Auto-generates Hazard entry</div>
<form class="form-card" method="POST">
  <div class="sec">Change Details</div>
  <div class="fg"><label>Change Title *</label><input type="text" name="title" required placeholder="e.g. Implementation of Electronic Flight Bag (EFB)"/></div>
  <div class="g3">
    <div class="fg"><label>Change Type *</label>
      <select name="change_type" required><option>Process</option><option>Equipment</option><option>Personnel</option><option>Regulatory</option><option>Organizational</option></select></div>
    <div class="fg"><label>Department *</label>
      <select name="department_id" required>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Planned Date *</label><input type="date" name="planned_date" required/></div>
  </div>
  <div class="fg"><label>Initiator *</label><input type="text" name="initiator" required placeholder="Name of person requesting the change"/></div>
  <div class="fg"><label>Description of Change *</label><textarea name="description" required rows="4" placeholder="Describe the change in detail — what is changing and why?"></textarea></div>
  <div class="fg"><label>Pre-Change Risk Assessment *</label><textarea name="pre_change_risk" required rows="4" placeholder="Identify risks associated with this change. What could go wrong? What controls are needed?"></textarea></div>
  <p style="font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:14px">⚡ A Hazard record will be automatically created from this MOC for tracking in the Risk Register.</p>
  <button type="submit" class="btn btn-nav">Submit MOC</button>
</form>
{% endblock %}

{% extends "base.html" %}
{% block title %}Schedule New Audit{% endblock %}
{% block content %}
<div class="page-title">Schedule New Audit</div>
<div class="page-sub">Create a new audit from an annual plan or ad-hoc</div>
<form class="form-card" method="POST">
  <div class="sec">Audit Information</div>
  <div class="fg"><label>Audit Title *</label><input type="text" name="title" required placeholder="e.g. Flight Operations SMS Compliance Audit — Q2 2025"/></div>
  <div class="g3">
    <div class="fg"><label>Audit Type *</label>
      <select name="audit_type" required><option>Internal Audit</option><option>Compliance Audit</option><option>IOSA-style Audit</option></select></div>
    <div class="fg"><label>Department *</label>
      <select name="department_id" required>
        <option value="">Select…</option>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Scheduled Date *</label><input type="date" name="scheduled_date" required/></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Lead Auditor *</label><input type="text" name="lead_auditor" required placeholder="Full name"/></div>
    <div class="fg"><label>Co-Auditor</label><input type="text" name="co_auditor" placeholder="Full name (optional)"/></div>
  </div>
  <div class="fg"><label>Linked Audit Plan (optional)</label>
    <select name="plan_id">
      <option value="">None (Ad-hoc)</option>
      {% for p in plans %}<option value="{{ p.id }}">{{ p.id }} — {{ p.department.name if p.department else '' }} {{ p.year }}</option>{% endfor %}
    </select></div>
  <button type="submit" class="btn btn-nav">Create & Schedule Audit</button>
</form>
{% endblock %}

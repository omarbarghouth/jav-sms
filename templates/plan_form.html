{% extends "base.html" %}
{% block title %}New Audit Plan{% endblock %}
{% block content %}
<div class="page-title">New Annual Audit Plan</div>
<div class="page-sub">Define audit coverage for a department for the year</div>
<form class="form-card" method="POST">
  <div class="sec">Plan Details</div>
  <div class="g3">
    <div class="fg"><label>Year *</label><input type="number" name="year" required value="{{ current_year }}" min="2024" max="2030"/></div>
    <div class="fg"><label>Department *</label>
      <select name="department_id" required>
        <option value="">Select…</option>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Audit Type *</label>
      <select name="audit_type" required>
        <option>Internal Audit</option><option>Compliance Audit</option><option>IOSA-style Audit</option>
      </select></div>
  </div>
  <div class="g2">
    <div class="fg"><label>Frequency *</label>
      <select name="frequency" required>
        <option>Annual</option><option>Semi-Annual</option><option>Quarterly</option>
      </select></div>
    <div class="fg"><label>Responsible Manager *</label><input type="text" name="responsible_manager" required placeholder="Department Manager name"/></div>
  </div>
  <div class="fg"><label>Audit Scope</label>
    <textarea name="scope" rows="3" placeholder="Describe what will be covered in this audit plan…"></textarea></div>
  <button type="submit" class="btn btn-nav">Create Audit Plan</button>
</form>
{% endblock %}

{% extends "base.html" %}
{% block title %}New Action{% endblock %}
{% block content %}
<div class="page-title">New Action</div>
<div class="page-sub">Every action must be linked to a source — Risk, Hazard, Audit, or other</div>
<form class="form-card" method="POST">
  {% if pre.return_url %}<input type="hidden" name="return_url" value="{{ pre.return_url }}"/>{% endif %}
  <div class="sec">Action Classification</div>
  <div class="g3">
    <div class="fg"><label>Source *</label>
      <select name="source" required>
        {% for s in ['Hazard Report','ASR','Risk Assessment','Audit','MOC','Investigation'] %}
        <option {% if pre.source==s %}selected{% endif %}>{{ s }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Action Type</label>
      <select name="action_type">
        <option>Corrective</option><option>Preventive</option><option>Improvement</option>
      </select></div>
    <div class="fg"><label>Priority *</label>
      <select name="priority" required>
        <option>High</option><option selected>Medium</option><option>Low</option>
      </select></div>
  </div>

  <div class="sec">Linked Entities (Traceability)</div>
  <div class="g2">
    <div class="fg"><label>Linked Hazard</label>
      <select name="hazard_id">
        <option value="">None</option>
        {% for h in hazards %}<option value="{{ h.id }}" {% if pre.hazard_id==h.id %}selected{% endif %}>{{ h.id }} — {{ (h.generic_hazard or '')[:50] }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Linked Risk</label>
      <select name="linked_risk_id">
        <option value="">None</option>
        {% for r in risks %}<option value="{{ r.id }}" {% if pre.linked_risk_id==r.id %}selected{% endif %}>{{ r.id }} — {{ (r.description or '')[:40] }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Linked Audit</label>
      <select name="linked_audit_id">
        <option value="">None</option>
        {% for a in audits %}<option value="{{ a.id }}" {% if pre.linked_audit_id==a.id %}selected{% endif %}>{{ a.id }} — {{ a.audit_type }}</option>{% endfor %}
      </select></div>
    <div class="fg"><label>Department</label>
      <select name="department_id">
        <option value="">Select…</option>
        {% for d in all_departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
      </select></div>
  </div>
  <div class="fg"><label>Other Reference ID</label>
    <input type="text" name="linked_ref_id" placeholder="e.g. Audit Finding ID, MOC ID…"/></div>

  <div class="sec">Action Details</div>
  <div class="fg"><label>Action Description *</label>
    <textarea name="description" required rows="4" placeholder="What must be done? Be specific and measurable…"></textarea></div>
  <div class="g2">
    <div class="fg"><label>Owner / Responsible *</label>
      <input type="text" name="owner" required placeholder="Name of responsible manager"/></div>
    <div class="fg"><label>Due Date *</label>
      <input type="date" name="due_date" required/></div>
  </div>
  <button type="submit" class="btn btn-nav">Create Action</button>
</form>
{% endblock %}
